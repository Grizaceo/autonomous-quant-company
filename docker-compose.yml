services:
  demo:
    build: .
    environment:
      AQTC_STRIPE_MODE: mock
      AQTC_NVIDIA_MODE: mock
      AQTC_DISABLE_HERMES_ENV: "true"
    command: ["aqtc", "demo"]

  api:
    build: .
    ports:
      - "8010:8010"
    environment:
      AQTC_STRIPE_MODE: mock
      AQTC_NVIDIA_MODE: mock
      AQTC_DISABLE_HERMES_ENV: "true"
    command: ["uvicorn", "aqtc.api.app:app", "--host", "0.0.0.0", "--port", "8010"]
